<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>わが家のお金</title>

<style>
body{
font-family:-apple-system,sans-serif;
background:#f5f5f5;
max-width:500px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
box-sizing:border-box;
}

button{
background:#4F46E5;
color:white;
border:none;
border-radius:10px;
}

#total{
font-size:32px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
}
</style>
</head>
<body>

<div class="card">
<h1>🏠 わが家のお金</h1>

<h2>今月の支出</h2>

<div id="total">0円</div>

<select id="category">
<option>食費</option>
<option>外食費</option>
<option>日用品費</option>
<option>レジャー費</option>
<option>ガソリン費</option>
<option>予備費</option>
</select>

<input id="amount" type="number" placeholder="金額">

<button onclick="addExpense()">
追加する
</button>

</div>

<div class="card">
<h2>履歴</h2>

<table>
<tbody id="history"></tbody>
</table>

</div>

<script>

let data=JSON.parse(localStorage.getItem("wagaya")||"[]");

function save(){
localStorage.setItem("wagaya",JSON.stringify(data));
render();
}

function addExpense(){

const amount=Number(
document.getElementById("amount").value
);

if(!amount)return;

data.push({
category:document.getElementById("category").value,
amount:amount
});

document.getElementById("amount").value="";

save();

}

function del(i){
data.splice(i,1);
save();
}

function render(){

let total=0;

let html="";

data.forEach((x,i)=>{

total+=x.amount;

html+=`
<tr>
<td>${x.category}</td>
<td>¥${x.amount.toLocaleString()}</td>
<td>
<button onclick="del(${i})">
削除
</button>
</td>
</tr>
`;

});

document.getElementById("history").innerHTML=html;

document.getElementById("total").innerHTML=
total.toLocaleString()+"円";

}

render();

</script>

</body>
</html>
