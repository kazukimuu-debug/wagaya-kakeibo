<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>わが家のお金</title>

<style>
body{
  font-family:-apple-system,sans-serif;
  background:#f5f5f5;
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  border-radius:15px;
  padding:20px;
  margin-bottom:15px;
}

input,button{
  width:100%;
  box-sizing:border-box;
  padding:12px;
  margin-top:10px;
}

button{
  background:#4F46E5;
  color:white;
  border:none;
  border-radius:10px;
}

#total{
  font-size:32px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
<h1>🏠 わが家のお金</h1>

<h2>今月の支出</h2>

<div id="total">0円</div>

<input
type="number"
id="amount"
placeholder="金額">

<button onclick="addExpense()">
追加する
</button>

</div>

<script>

let total=0;

function addExpense(){

  total+=Number(
    document.getElementById("amount").value
  );

  document.getElementById("total").innerHTML=
    total.toLocaleString()+"円";

  document.getElementById("amount").value="";
}

</script>

</body>
</html>
