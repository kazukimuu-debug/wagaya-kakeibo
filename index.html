<script>
const budgets={
"食費":40000,
"外食費":10000,
"レジャー費":10000,
"日用品費"20000,
"ガソリン費":5000,
"予備費":10000
};

let data=JSON.parse(localStorage.getItem("wagaya")||"[]");

function save(){
localStorage.setItem("wagaya",JSON.stringify(data));
render();
}

function addExpense(){

const amount=Number(
document.getElementById("amount").value
);

if(!amount)return;

data.push({
category:document.getElementById("category").value,
amount:amount
});

document.getElementById("amount").value="";

save();

}

function del(i){
data.splice(i,1);
save();
}

function render(){

let totalBudget=0;
Object.values(budgets).forEach(x=>totalBudget+=x);

let spent=0;

const used={};
Object.keys(budgets).forEach(k=>used[k]=0);

data.forEach(x=>{
spent+=x.amount;
used[x.category]+=x.amount;
});

document.getElementById("totalBudget").innerHTML=
"¥"+totalBudget.toLocaleString();

document.getElementById("spent").innerHTML=
"¥"+spent.toLocaleString();

document.getElementById("remaining").innerHTML=
"¥"+(totalBudget-spent).toLocaleString();

let budgetHtml="";

Object.keys(budgets).forEach(k=>{

const remain=budgets[k]-used[k];

budgetHtml+=`
<tr>
<td>${k}</td>
<td>¥${budgets[k].toLocaleString()}</td>
<td>¥${used[k].toLocaleString()}</td>
<td style="color:${remain<0?'red':'black'}">
¥${remain.toLocaleString()}
</td>
</tr>
`;

});

document.getElementById("budgetTable").innerHTML=budgetHtml;

let hist="";

data.forEach((x,i)=>{

hist+=`
<tr>
<td>${x.category}</td>
<td>¥${x.amount.toLocaleString()}</td>
<td>
<button onclick="del(${i})">
削除
</button>
</td>
</tr>
`;

});

document.getElementById("history").innerHTML=hist;

}

render();

</script>
