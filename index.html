<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🏠 わが家のお金</title>

<style>

body{
font-family:-apple-system,sans-serif;
max-width:600px;
margin:auto;
padding:16px;
background:#f5f5f5;
}

.card{
background:white;
padding:16px;
border-radius:16px;
margin-bottom:16px;
}

.row{
display:flex;
justify-content:space-between;
margin:8px 0;
}

input,select,button{
width:100%;
padding:12px;
margin-top:8px;
box-sizing:border-box;
font-size:16px;
border-radius:10px;
border:1px solid #ddd;
}

button{
background:#4F46E5;
color:white;
border:none;
}

.danger{
background:#d32f2f;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

.over{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<h1>🏠 わが家のお金</h1>

<div class="card">

<h2>今月の状況</h2>

<div class="row">
<span>総予算</span>
<strong id="totalBudget"></strong>
</div>

<div class="row">
<span>使用額</span>
<strong id="spent"></strong>
</div>

<div class="row">
<span>残額</span>
<strong id="remaining"></strong>
</div>

</div>

<div class="card">

<h2>支出入力</h2>

<select id="category">

<option>食費</option>

<option>外食/レジャー費</option>

<option>日用品費</option>

<option>ガソリン費</option>

</select>

<input
id="amount"
type="number"
placeholder="金額">

<input
id="memo"
placeholder="メモ（任意）">

<button onclick="addExpense()">

追加する

</button>

</div>

<div class="card">

<h2>予算設定</h2>

<label>食費</label>

<input id="budgetFood" type="number">

<label>外食/レジャー費</label>

<input id="budgetLeisure" type="number">

<label>日用品費</label>

<input id="budgetDaily" type="number">

<label>ガソリン費</label>

<input id="budgetGas" type="number">

<button onclick="saveBudgets()">

予算を保存

</button>

</div>

<div class="card">

<h2>予算管理</h2>

<table>

<thead>

<tr>

<th>項目</th>

<th>残り</th>

</tr>

</thead>

<tbody id="budgetTable">

</tbody>

</table>

</div>

<div class="card">

<h2>履歴</h2>

<table>

<thead>

<tr>

<th>項目</th>

<th>金額</th>

<th>メモ</th>

<th></th>

</tr>

</thead>

<tbody id="history">

</tbody>

</table>

</div>

<button
class="danger"
onclick="resetMonth()">

⚠️ 今月をリセット

</button>

  <script>

let budgets = JSON.parse(localStorage.getItem("wagaya_budgets")) || {
  "食費":40000,
  "外食/レジャー費":8000,
  "日用品費":20000,
  "ガソリン費":5000
};

let data = JSON.parse(localStorage.getItem("wagaya_data")) || [];

function save(){

  localStorage.setItem(
    "wagaya_data",
    JSON.stringify(data)
  );

  localStorage.setItem(
    "wagaya_budgets",
    JSON.stringify(budgets)
  );

  render();

}

function addExpense(){

  const amount =
    Number(document.getElementById("amount").value);

  if(!amount) return;

  data.push({
    category:
      document.getElementById("category").value,

    amount:amount,

    memo:
      document.getElementById("memo").value
  });

  document.getElementById("amount").value="";
  document.getElementById("memo").value="";

  save();

}

function saveBudgets(){

  budgets["食費"] =
    Number(document.getElementById("budgetFood").value);

  budgets["外食/レジャー費"] =
    Number(document.getElementById("budgetLeisure").value);

  budgets["日用品費"] =
    Number(document.getElementById("budgetDaily").value);

  budgets["ガソリン費"] =
    Number(document.getElementById("budgetGas").value);

  save();

}

function del(i){

  data.splice(i,1);

  save();

}

function resetMonth(){

  if(!confirm("今月の履歴を削除しますか？")) return;

  data=[];

  save();

}

function render(){

  document.getElementById("budgetFood").value =
    budgets["食費"];

  document.getElementById("budgetLeisure").value =
    budgets["外食/レジャー費"];

  document.getElementById("budgetDaily").value =
    budgets["日用品費"];

  document.getElementById("budgetGas").value =
    budgets["ガソリン費"];

  let totalBudget = 0;

  Object.values(budgets).forEach(x=>{
    totalBudget += x;
  });

  let spent = 0;

  const used = {
    "食費":0,
    "外食/レジャー費":0,
    "日用品費":0,
    "ガソリン費":0
  };

  data.forEach(x=>{

    spent += x.amount;

    used[x.category] += x.amount;

  });

  document.getElementById("totalBudget").innerHTML =
    "¥"+totalBudget.toLocaleString();

  document.getElementById("spent").innerHTML =
    "¥"+spent.toLocaleString();

  document.getElementById("remaining").innerHTML =
    "¥"+(totalBudget-spent).toLocaleString();

  let budgetHtml = "";

  Object.keys(budgets).forEach(key=>{

    const remain =
      budgets[key]-used[key];

    budgetHtml += `
    <tr>
      <td>${key}</td>
      <td class="${remain<0?'over':''}">
        ¥${remain.toLocaleString()}
      </td>
    </tr>
    `;

  });

  document.getElementById("budgetTable").innerHTML =
    budgetHtml;

  let historyHtml = "";

  data.forEach((x,i)=>{

    historyHtml += `
    <tr>
      <td>${x.category}</td>
      <td>¥${x.amount.toLocaleString()}</td>
      <td>${x.memo}</td>
      <td>
        <button onclick="del(${i})">
          削除
        </button>
      </td>
    </tr>
    `;

  });

  document.getElementById("history").innerHTML =
    historyHtml;

}

render();

</script>

</body>
</html>
